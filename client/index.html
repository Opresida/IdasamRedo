<!DOCTYPE html>
<html lang="pt-BR" translate="no" class="notranslate">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <meta name="google" content="notranslate" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;500;600;700&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    
    <!-- Vite Connection Blocker for Replit Environment -->
    <script>
      // Block Vite WebSocket connections before main app loads
      if (window.location.hostname.includes('replit.dev')) {
        const originalFetch = window.fetch;
        window.fetch = function(input, init) {
          const url = input.toString();
          if (url.includes('vite') && url.includes('ping')) {
            console.warn('Vite ping blocked (Replit environment)');
            return Promise.reject(new Error('Vite ping blocked in Replit'));
          }
          return originalFetch.apply(this, arguments);
        };
        
        // Suppress console.error for known Vite connection issues
        const originalConsoleError = console.error;
        console.error = function(...args) {
          const message = args.join(' ');
          if (message.includes('[vite]') || 
              message.includes('WebSocket') || 
              message.includes('Failed to fetch')) {
            return; // Suppress these specific errors
          }
          originalConsoleError.apply(console, args);
        };
      }
    </script>
    
    <script type="module" src="/src/main.tsx"></script>
    <!-- This is a replit script which adds a banner on the top of the page when opened in development mode outside the replit environment -->
    <script type="text/javascript" src="https://replit.com/public/js/replit-dev-banner.js"></script>
  </body>
</html>
